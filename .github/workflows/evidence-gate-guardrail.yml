name: Evidence Gate Required Check

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: write

jobs:
  evidence-gate:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect changed paths
        id: diff
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          output = subprocess.check_output(
              ["git", "diff", "--name-only", f"{os.environ['BASE_SHA']}..{os.environ['HEAD_SHA']}"],
              text=True,
          )
          paths = [line.strip() for line in output.splitlines() if line.strip()]
          github_output = Path(os.environ["GITHUB_OUTPUT"])
          with github_output.open("a", encoding="utf-8") as handle:
              handle.write(f"paths={json.dumps(paths)}\n")
          PY

      - name: Build guardrail inputs
        id: gate_inputs
        shell: bash
        env:
          CHANGED_PATHS_JSON: ${{ steps.diff.outputs.paths }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          changed_paths = json.loads(os.environ["CHANGED_PATHS_JSON"])
          strict_prefixes = (
              "app/evidence_gate/decision/",
              "app/evidence_gate/ingest/",
              "app/evidence_gate/mcp/",
              "app/evidence_gate/retrieval/",
              ".github/workflows/",
              "scripts/run_action_guardrail.py",
              "action.yml",
          )
          strict_mode = any(path.startswith(strict_prefixes) for path in changed_paths)

          safety_policy = {
              "max_blast_radius_files": 15 if strict_mode else 30,
              "max_hazard": 0.55 if strict_mode else 0.75,
              "min_confidence": 0.45 if strict_mode else 0.30,
              "require_test_evidence": strict_mode,
              "require_precedent": strict_mode,
          }

          github_output = Path(os.environ["GITHUB_OUTPUT"])
          with github_output.open("a", encoding="utf-8") as handle:
              handle.write(
                  "safety_policy="
                  + json.dumps(safety_policy, separators=(",", ":"))
                  + "\n"
              )
              handle.write(f"strict_mode={'true' if strict_mode else 'false'}\n")
          PY

      - name: Run Evidence Gate
        id: evidence_gate
        uses: scrallex/evidence-gate@evidence-gate
        with:
          action_summary: >-
            Pull request #${{ github.event.pull_request.number }}:
            ${{ github.event.pull_request.title }}.
            Evaluate the diff as an active merge gate and block if the safety policy is violated.
          changed_paths: ${{ steps.diff.outputs.paths }}
          base_sha: ${{ github.event.pull_request.base.sha }}
          head_sha: ${{ github.event.pull_request.head.sha }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          jira_api_token: ${{ secrets.JIRA_API_TOKEN }}
          jira_base_url: ${{ vars.JIRA_BASE_URL }}
          jira_user_email: ${{ vars.JIRA_USER_EMAIL }}
          jira_project_keys: ${{ vars.JIRA_PROJECT_KEYS }}
          pagerduty_token: ${{ secrets.PAGERDUTY_TOKEN }}
          gating_mode: enforce
          safety_policy_preset: strict-financial
          safety_policy: ${{ steps.gate_inputs.outputs.safety_policy }}

      - name: Upsert Evidence Gate PR comment
        if: ${{ always() && steps.evidence_gate.outputs.comment_path != '' }}
        uses: actions/github-script@v7
        env:
          COMMENT_PATH: ${{ steps.evidence_gate.outputs.comment_path }}
        with:
          script: |
            const fs = require("fs");

            const marker = "<!-- evidence-gate-comment -->";
            const body = `${marker}\n${fs.readFileSync(process.env.COMMENT_PATH, "utf8")}`;
            const issue_number = context.payload.pull_request.number;
            const { owner, repo } = context.repo;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) => {
              return comment.user?.type === "Bot" && comment.body?.includes(marker);
            });

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            });
